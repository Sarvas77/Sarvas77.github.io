<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fully 3D Three-Body Stick Orbit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #050505; }
        canvas { display: block; }
        #ui-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }
        #controls {
            position: absolute; top: 20px; right: 20px;
            color: #ededed; font-family: 'JetBrains Mono', monospace, sans-serif;
            background: rgba(13, 13, 13, 0.85); padding: 15px 25px; border-radius: 12px;
            border: 1px solid #1f1f1f; display: flex; flex-direction: column; align-items: center; gap: 12px;
            backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            pointer-events: auto;
        }
        button {
            background: rgba(255, 255, 255, 0.05); color: #64ffda;
            border: 1px solid rgba(100, 255, 218, 0.3); padding: 8px 16px;
            font-family: inherit; font-size: 14px; border-radius: 6px;
            cursor: pointer; outline: none; transition: all 0.2s ease;
        }
        button:hover { background: rgba(100, 255, 218, 0.1); border-color: #64ffda; }
        .help-text { color: #888; font-size: 11px; text-align: center; line-height: 1.4; }
    </style>
</head>
<body>
    <div id="ui-container">
        <div id="controls">
            <div style="font-weight: 600; font-size: 14px; letter-spacing: 1px; color: #ff00ff;">RIGID BODY MECHANICS</div>
            <button id="toggleBtn" onclick="toggleSim()">Start Simulation</button>
            <div class="help-text">Left Click + Drag to rotate<br>Scroll to zoom</div>
        </div>
    </div>

    <!-- Three.js Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

    <script>
        let scene, camera, renderer, composer, controls;
        let isRunning = false;
        
        function toggleSim() {
            isRunning = !isRunning;
            document.getElementById('toggleBtn').innerText = isRunning ? "Pause" : "Start Simulation";
        }

        const W = 3;
        const G = 1.1;
        const dt = 0.002;
        
        let planets = [];
        let stick;

        class Particle {
            constructor(pos, vel, m, r, colorHex) {
                this.m = m;
                this.pos = pos.clone();
                this.v = vel.clone();
                this.f = new THREE.Vector3();
                this.radius = r;
                
                const geo = new THREE.SphereGeometry(r, 32, 32);
                const mat = new THREE.MeshBasicMaterial({ color: colorHex });
                this.mesh = new THREE.Mesh(geo, mat);
                this.mesh.position.copy(this.pos);
                scene.add(this.mesh);
                
                this.trailLen = 300;
                this.trailPositions = new Float32Array(this.trailLen * 3);
                for(let i=0; i<this.trailLen; i++) {
                    this.trailPositions[i*3] = this.pos.x;
                    this.trailPositions[i*3+1] = this.pos.y;
                    this.trailPositions[i*3+2] = this.pos.z;
                }
                const trailGeo = new THREE.BufferGeometry();
                trailGeo.setAttribute('position', new THREE.BufferAttribute(this.trailPositions, 3));
                const trailMat = new THREE.LineBasicMaterial({ color: colorHex, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending });
                this.trail = new THREE.Line(trailGeo, trailMat);
                scene.add(this.trail);
            }
            updateTrail() {
                for(let i = this.trailLen - 1; i > 0; i--) {
                    this.trailPositions[i*3] = this.trailPositions[(i-1)*3];
                    this.trailPositions[i*3+1] = this.trailPositions[(i-1)*3+1];
                    this.trailPositions[i*3+2] = this.trailPositions[(i-1)*3+2];
                }
                this.trailPositions[0] = this.pos.x;
                this.trailPositions[1] = this.pos.y;
                this.trailPositions[2] = this.pos.z;
                this.trail.geometry.attributes.position.needsUpdate = true;
            }
        }

        class RigidStick {
            constructor() {
                this.m = 1.2;
                this.L = 2.0;
                this.radius = 0.05;
                this.N = 15;
                this.dm = this.m / this.N;
                this.I = (1/12) * this.m * this.L * this.L;
                
                this.center = new THREE.Vector3((Math.random()-0.5)*W, (Math.random()-0.5)*W, (Math.random()-0.5)*W);
                this.axis = new THREE.Vector3(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5).normalize().multiplyScalar(this.L);
                this.v = new THREE.Vector3((Math.random()-0.5)*2, (Math.random()-0.5)*2, (Math.random()-0.5)*2);
                
                const raw_omega = new THREE.Vector3((Math.random()-0.5)*4, (Math.random()-0.5)*4, (Math.random()-0.5)*4);
                const s_dir = this.axis.clone().normalize();
                this.omega = raw_omega.clone().sub(s_dir.clone().multiplyScalar(raw_omega.dot(s_dir)));
                
                this.f = new THREE.Vector3();
                this.torque = new THREE.Vector3();
                
                const geo = new THREE.CylinderGeometry(this.radius, this.radius, this.L, 16);
                geo.rotateX(Math.PI / 2); // align with Z initially
                const mat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
                this.mesh = new THREE.Mesh(geo, mat);
                scene.add(this.mesh);
            }
            updateMesh() {
                this.mesh.position.copy(this.center);
                const up = new THREE.Vector3(0,0,1);
                const dir = this.axis.clone().normalize();
                const quaternion = new THREE.Quaternion().setFromUnitVectors(up, dir);
                this.mesh.setRotationFromQuaternion(quaternion);
            }
        }

        function rand_pos() {
            const r = W - 0.5;
            return new THREE.Vector3((Math.random()-0.5)*r*2, (Math.random()-0.5)*r*2, (Math.random()-0.5)*r*2);
        }
        function rand_vel() {
            const v = 1;
            return new THREE.Vector3((Math.random()-0.5)*v*2, (Math.random()-0.5)*v*2, (Math.random()-0.5)*v*2);
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            
            camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 8);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);
            
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            
            const renderScene = new THREE.RenderPass(scene, camera);
            const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.1);
            bloomPass.threshold = 0;
            bloomPass.strength = 1.5;
            bloomPass.radius = 0.5;
            
            composer = new THREE.EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);
            
            window.addEventListener('resize', onWindowResize);
            
            // Boundary box
            const boxGeo = new THREE.BoxGeometry(2*W, 2*W, 2*W);
            const boxMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.05, wireframe: true });
            const box = new THREE.Mesh(boxGeo, boxMat);
            scene.add(box);

            // Objects
            planets.push(new Particle(rand_pos(), rand_vel(), 1.2, 0.10, 0xff0044));
            planets.push(new Particle(rand_pos(), rand_vel(), 1.3, 0.20, 0x00ffff));
            planets.push(new Particle(rand_pos(), rand_vel(), 1.4, 0.15, 0x00ff00));
            
            stick = new RigidStick();
            
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }

        function stepPhysics() {
            // Reset
            for(let p of planets) p.f.set(0,0,0);
            stick.f.set(0,0,0);
            stick.torque.set(0,0,0);
            
            // Planet-Planet Gravity
            for(let i=0; i<planets.length; i++) {
                for(let j=i+1; j<planets.length; j++) {
                    const r_vec = planets[j].pos.clone().sub(planets[i].pos);
                    const r_mag = r_vec.length();
                    if(r_mag > 0.01) {
                        const f_mag = G * planets[i].m * planets[j].m / (r_mag*r_mag);
                        const f_vec = r_vec.normalize().multiplyScalar(f_mag);
                        planets[i].f.add(f_vec);
                        planets[j].f.sub(f_vec);
                    }
                }
            }
            
            // Stick-Planet Gravity
            const s_dir = stick.axis.clone().normalize();
            for(let p of planets) {
                for(let k=0; k<stick.N; k++) {
                    const offset = -stick.L/2 + (k+0.5)*(stick.L/stick.N);
                    const segment_pos = stick.center.clone().add(s_dir.clone().multiplyScalar(offset));
                    
                    const r_vec = p.pos.clone().sub(segment_pos);
                    const r_mag = r_vec.length();
                    
                    const softening = 0.05;
                    const f_mag = -G * p.m * stick.dm / (r_mag*r_mag + softening*softening);
                    const f_vec = r_vec.normalize().multiplyScalar(f_mag);
                    
                    p.f.add(f_vec);
                    stick.f.sub(f_vec);
                    
                    const r_cross = segment_pos.clone().sub(stick.center);
                    stick.torque.add(r_cross.clone().cross(f_vec.clone().multiplyScalar(-1)));
                }
            }
            
            // Integration
            for(let p of planets) {
                p.v.add(p.f.clone().divideScalar(p.m).multiplyScalar(dt));
                p.pos.add(p.v.clone().multiplyScalar(dt));
            }
            
            stick.v.add(stick.f.clone().divideScalar(stick.m).multiplyScalar(dt));
            stick.center.add(stick.v.clone().multiplyScalar(dt));
            
            stick.omega.add(stick.torque.clone().divideScalar(stick.I).multiplyScalar(dt));
            stick.omega.sub(s_dir.clone().multiplyScalar(stick.omega.dot(s_dir))); // Keep omega orthogonal to axis
            
            stick.axis.add(stick.omega.clone().cross(stick.axis).multiplyScalar(dt));
            stick.axis.normalize().multiplyScalar(stick.L);
            
            const restitution = 1.0;
            
            // Boundary Collisions
            for(let p of planets) {
                const limit = W - p.radius;
                if(p.pos.x > limit) { p.v.x *= -1; p.pos.x = limit; }
                else if(p.pos.x < -limit) { p.v.x *= -1; p.pos.x = -limit; }
                if(p.pos.y > limit) { p.v.y *= -1; p.pos.y = limit; }
                else if(p.pos.y < -limit) { p.v.y *= -1; p.pos.y = -limit; }
                if(p.pos.z > limit) { p.v.z *= -1; p.pos.z = limit; }
                else if(p.pos.z < -limit) { p.v.z *= -1; p.pos.z = -limit; }
            }
            
            const sLimit = W - stick.L/2;
            if(stick.center.x > sLimit) { stick.v.x *= -1; stick.center.x = sLimit; }
            else if(stick.center.x < -sLimit) { stick.v.x *= -1; stick.center.x = -sLimit; }
            if(stick.center.y > sLimit) { stick.v.y *= -1; stick.center.y = sLimit; }
            else if(stick.center.y < -sLimit) { stick.v.y *= -1; stick.center.y = -sLimit; }
            if(stick.center.z > sLimit) { stick.v.z *= -1; stick.center.z = sLimit; }
            else if(stick.center.z < -sLimit) { stick.v.z *= -1; stick.center.z = -sLimit; }
            
            // Planet-Planet Collision
            for(let i=0; i<planets.length; i++) {
                for(let j=i+1; j<planets.length; j++) {
                    const r_vec = planets[i].pos.clone().sub(planets[j].pos);
                    const dist = r_vec.length();
                    const min_dist = planets[i].radius + planets[j].radius;
                    if(dist < min_dist) {
                        const n = r_vec.clone().normalize();
                        const v_rel = planets[i].v.clone().sub(planets[j].v);
                        const v_rel_n = v_rel.dot(n);
                        if(v_rel_n < 0) {
                            const j_impulse = -(1 + restitution) * v_rel_n / (1/planets[i].m + 1/planets[j].m);
                            planets[i].v.add(n.clone().multiplyScalar(j_impulse / planets[i].m));
                            planets[j].v.sub(n.clone().multiplyScalar(j_impulse / planets[j].m));
                        }
                        const overlap = min_dist - dist;
                        const total_m = planets[i].m + planets[j].m;
                        planets[i].pos.add(n.clone().multiplyScalar(overlap * planets[j].m/total_m));
                        planets[j].pos.sub(n.clone().multiplyScalar(overlap * planets[i].m/total_m));
                    }
                }
            }
            
            // Planet-Stick Collision
            s_dir.copy(stick.axis).normalize();
            for(let p of planets) {
                const rel_pos = p.pos.clone().sub(stick.center);
                let proj_len = rel_pos.dot(s_dir);
                proj_len = Math.max(-stick.L/2, Math.min(stick.L/2, proj_len));
                
                const closest_pt = stick.center.clone().add(s_dir.clone().multiplyScalar(proj_len));
                const r_vec = p.pos.clone().sub(closest_pt);
                const dist = r_vec.length();
                const min_dist = p.radius + stick.radius;
                
                if(dist < min_dist) {
                    const n = dist > 1e-5 ? r_vec.clone().normalize() : new THREE.Vector3(0,1,0);
                    const r_s = closest_pt.clone().sub(stick.center);
                    
                    const v_stick_pt = stick.v.clone().add(stick.omega.clone().cross(r_s));
                    const v_rel = p.v.clone().sub(v_stick_pt);
                    const v_rel_n = v_rel.dot(n);
                    
                    if(v_rel_n < 0) {
                        const rs_cross_n = r_s.clone().cross(n);
                        const j_denom = 1/p.m + 1/stick.m + rs_cross_n.lengthSq()/stick.I;
                        const j_impulse = -(1 + restitution) * v_rel_n / j_denom;
                        
                        const J_vec = n.clone().multiplyScalar(j_impulse);
                        
                        p.v.add(J_vec.clone().divideScalar(p.m));
                        stick.v.sub(J_vec.clone().divideScalar(stick.m));
                        stick.omega.sub(r_s.clone().cross(J_vec).divideScalar(stick.I));
                    }
                    
                    const overlap = min_dist - dist;
                    if(overlap > 0) {
                        const total_m = p.m + stick.m;
                        p.pos.add(n.clone().multiplyScalar(overlap * stick.m/total_m));
                        stick.center.sub(n.clone().multiplyScalar(overlap * p.m/total_m));
                    }
                }
            }
            
            for(let p of planets) p.mesh.position.copy(p.pos);
            stick.updateMesh();
        }

        let trailTimer = 0;
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            
            if (isRunning) {
                for(let i=0; i<10; i++) {
                    stepPhysics();
                }
                
                trailTimer++;
                if (trailTimer >= 2) {
                    for(let p of planets) p.updateTrail();
                    trailTimer = 0;
                }
            }
            
            composer.render();
        }

        init();
    </script>
</body>
</html>
