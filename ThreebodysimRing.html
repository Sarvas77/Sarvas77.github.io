<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3-Body Ring Simulation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #050505; }
        canvas { display: block; }
        #ui-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }
        #controls {
            position: absolute; top: 20px; right: 20px;
            color: #ededed; font-family: 'JetBrains Mono', monospace, sans-serif;
            background: rgba(13, 13, 13, 0.85); padding: 15px 25px; border-radius: 12px;
            border: 1px solid #1f1f1f; display: flex; flex-direction: column; align-items: center; gap: 12px;
            backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            pointer-events: auto;
        }
        button {
            background: rgba(255, 255, 255, 0.05); color: #64ffda;
            border: 1px solid rgba(100, 255, 218, 0.3); padding: 8px 16px;
            font-family: inherit; font-size: 14px; border-radius: 6px;
            cursor: pointer; outline: none; transition: all 0.2s ease;
        }
        button:hover { background: rgba(100, 255, 218, 0.1); border-color: #64ffda; }
        .help-text { color: #888; font-size: 11px; text-align: center; line-height: 1.4; }
    </style>
</head>
<body>
    <div id="ui-container">
        <div id="controls">
            <div style="font-weight: 600; font-size: 14px; letter-spacing: 1px; color: #00ffff;">3-BODY RING DYNAMICS</div>
            <button id="toggleBtn" onclick="toggleSim()">Start Simulation</button>
            <div class="help-text">Left Click + Drag to rotate<br>Scroll to zoom</div>
        </div>
    </div>

    <!-- Three.js Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

    <script>
        let scene, camera, renderer, composer, controls;
        let isRunning = false;
        
        function toggleSim() {
            isRunning = !isRunning;
            document.getElementById('toggleBtn').innerText = isRunning ? "Pause" : "Start Simulation";
        }

        // Physics variables
        const G = 10;
        const dt = 0.001;
        let bodies = [];
        let b_ring;
        const ring_radius = 2;
        const ring_thickness = 0.2;
        
        class Particle {
            constructor(pos, vel, m, r, colorHex) {
                this.m = m;
                this.pos = pos.clone();
                this.v = vel.clone();
                this.p = this.v.clone().multiplyScalar(this.m);
                this.f = new THREE.Vector3();
                this.radius = r;
                
                const geo = new THREE.SphereGeometry(r, 32, 32);
                const mat = new THREE.MeshBasicMaterial({ color: colorHex });
                this.mesh = new THREE.Mesh(geo, mat);
                this.mesh.position.copy(this.pos);
                scene.add(this.mesh);
                
                // Trail
                this.trailLen = 300;
                this.trailPositions = new Float32Array(this.trailLen * 3);
                for(let i=0; i<this.trailLen; i++) {
                    this.trailPositions[i*3] = this.pos.x;
                    this.trailPositions[i*3+1] = this.pos.y;
                    this.trailPositions[i*3+2] = this.pos.z;
                }
                const trailGeo = new THREE.BufferGeometry();
                trailGeo.setAttribute('position', new THREE.BufferAttribute(this.trailPositions, 3));
                const trailMat = new THREE.LineBasicMaterial({ color: colorHex, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending });
                this.trail = new THREE.Line(trailGeo, trailMat);
                scene.add(this.trail);
            }
            updateTrail() {
                for(let i = this.trailLen - 1; i > 0; i--) {
                    this.trailPositions[i*3] = this.trailPositions[(i-1)*3];
                    this.trailPositions[i*3+1] = this.trailPositions[(i-1)*3+1];
                    this.trailPositions[i*3+2] = this.trailPositions[(i-1)*3+2];
                }
                this.trailPositions[0] = this.pos.x;
                this.trailPositions[1] = this.pos.y;
                this.trailPositions[2] = this.pos.z;
                this.trail.geometry.attributes.position.needsUpdate = true;
            }
        }

        class Ring {
            constructor(m, r, th, colorHex) {
                this.m = m;
                this.pos = new THREE.Vector3(0,0,0);
                this.p = new THREE.Vector3(0,0,0);
                this.f = new THREE.Vector3();
                this.radius = r;
                this.thickness = th;
                
                const geo = new THREE.TorusGeometry(r, th, 16, 100);
                const mat = new THREE.MeshBasicMaterial({ color: colorHex });
                this.mesh = new THREE.Mesh(geo, mat);
                scene.add(this.mesh);
            }
        }

        function rand_vel(v_scale) {
            return new THREE.Vector3(
                (Math.random() * 2 - 1) * v_scale,
                (Math.random() * 2 - 1) * v_scale,
                (Math.random() * 2 - 1) * v_scale
            );
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            
            camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 8);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);
            
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            
            const renderScene = new THREE.RenderPass(scene, camera);
            const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.1);
            bloomPass.threshold = 0;
            bloomPass.strength = 1.5;
            bloomPass.radius = 0.5;
            
            composer = new THREE.EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);
            
            window.addEventListener('resize', onWindowResize);
            
            // Build Scene
            // Background stars
            const starsGeo = new THREE.BufferGeometry();
            const starsPos = new Float32Array(600 * 3);
            for(let i=0; i<600; i++) {
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(Math.random() * 2 - 1);
                const r = 30 + Math.random() * 20;
                starsPos[i*3] = r * Math.sin(phi) * Math.cos(theta);
                starsPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
                starsPos[i*3+2] = r * Math.cos(phi);
            }
            starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
            const starsMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1 });
            const stars = new THREE.Points(starsGeo, starsMat);
            scene.add(stars);

            // Bodies
            const v_scale = 2.5;
            const b1 = new Particle(new THREE.Vector3(1, 1, 0), rand_vel(v_scale), 1.3, 0.15, 0xff00ff);
            const b2 = new Particle(new THREE.Vector3(-1, -1, 0), rand_vel(v_scale), 1.4, 0.17, 0x00ffff);
            const b3 = new Particle(new THREE.Vector3(0, 0, 1.5), new THREE.Vector3(), 1.2, 0.19, 0x00ff00);
            
            // Conserve momentum for initial state
            const p1 = b1.p.clone();
            const p2 = b2.p.clone();
            b3.p = p1.add(p2).multiplyScalar(-1);
            b3.v = b3.p.clone().divideScalar(b3.m);
            
            bodies = [b1, b2, b3];
            
            b_ring = new Ring(0.5, ring_radius, ring_thickness, 0xff8800);
            
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }

        function stepPhysics() {
            // Reset forces
            for(let b of bodies) b.f.set(0,0,0);
            b_ring.f.set(0,0,0);
            
            // Body-Body Gravity
            for(let i=0; i<bodies.length; i++) {
                for(let j=i+1; j<bodies.length; j++) {
                    const r_vec = bodies[j].pos.clone().sub(bodies[i].pos);
                    const r_mag = r_vec.length();
                    if(r_mag > 0.01) {
                        const force_mag = G * bodies[i].m * bodies[j].m / (r_mag*r_mag + 0.01);
                        const force_vec = r_vec.clone().normalize().multiplyScalar(force_mag);
                        bodies[i].f.add(force_vec);
                        bodies[j].f.sub(force_vec);
                    }
                }
            }
            
            // Body-Ring Gravity (approximated by segments)
            const num_ring_segments = 16;
            const d_theta = 2 * Math.PI / num_ring_segments;
            const segment_mass = b_ring.m / num_ring_segments;
            for(let b of bodies) {
                for(let k=0; k<num_ring_segments; k++) {
                    const theta = k * d_theta;
                    const segment_pos = b_ring.pos.clone().add(new THREE.Vector3(ring_radius*Math.cos(theta), ring_radius*Math.sin(theta), 0));
                    const r_vec = segment_pos.sub(b.pos);
                    const r_mag = r_vec.length();
                    if (r_mag > 0.1) {
                        const force_mag = G * b.m * segment_mass / (r_mag*r_mag + 0.09);
                        const force_vec = r_vec.normalize().multiplyScalar(force_mag);
                        b.f.add(force_vec);
                        b_ring.f.sub(force_vec);
                    }
                }
            }
            
            // Confining potential
            const max_radius = 10;
            const all_objects = [...bodies, b_ring];
            for(let b of all_objects) {
                const r_mag = b.pos.length();
                if(r_mag > max_radius) {
                    const restoring_force = b.pos.clone().normalize().multiplyScalar(-0.05 * b.m * (r_mag - max_radius));
                    b.f.add(restoring_force);
                }
            }
            
            // Integration
            for(let b of all_objects) {
                b.p.add(b.f.clone().multiplyScalar(dt));
                b.pos.add(b.p.clone().divideScalar(b.m).multiplyScalar(dt));
            }
            
            // Body-Body Collisions
            for(let i=0; i<bodies.length; i++) {
                for(let j=i+1; j<bodies.length; j++) {
                    const r_vec = bodies[i].pos.clone().sub(bodies[j].pos);
                    const dist = r_vec.length();
                    const min_dist = bodies[i].radius + bodies[j].radius;
                    if(dist < min_dist) {
                        const v1 = bodies[i].p.clone().divideScalar(bodies[i].m);
                        const v2 = bodies[j].p.clone().divideScalar(bodies[j].m);
                        const v_rel = v1.clone().sub(v2);
                        if(v_rel.dot(r_vec) < 0) {
                            const m1 = bodies[i].m;
                            const m2 = bodies[j].m;
                            const n = r_vec.clone().normalize();
                            
                            const dot1 = v1.clone().sub(v2).dot(r_vec) / (dist*dist);
                            const v1_new = v1.clone().sub(r_vec.clone().multiplyScalar(2*m2/(m1+m2) * dot1));
                            
                            const dot2 = v2.clone().sub(v1).dot(r_vec.clone().multiplyScalar(-1)) / (dist*dist);
                            const v2_new = v2.clone().sub(r_vec.clone().multiplyScalar(-1).multiplyScalar(2*m1/(m1+m2) * dot2));
                            
                            bodies[i].p = v1_new.multiplyScalar(m1);
                            bodies[j].p = v2_new.multiplyScalar(m2);
                        }
                        const overlap = min_dist - dist;
                        const n = r_vec.clone().normalize();
                        const total_m = bodies[i].m + bodies[j].m;
                        bodies[i].pos.add(n.clone().multiplyScalar(overlap * bodies[j].m/total_m));
                        bodies[j].pos.sub(n.clone().multiplyScalar(overlap * bodies[i].m/total_m));
                    }
                }
            }
            
            // Body-Ring Collisions
            for(let b of bodies) {
                const rel_pos = b.pos.clone().sub(b_ring.pos);
                const xy_pos = new THREE.Vector3(rel_pos.x, rel_pos.y, 0);
                const dist_to_center = xy_pos.length();
                if(dist_to_center > 0.01) {
                    const closest_ring_pt = b_ring.pos.clone().add(xy_pos.normalize().multiplyScalar(ring_radius));
                    const r_vec = b.pos.clone().sub(closest_ring_pt);
                    const dist_to_tube = r_vec.length();
                    const min_dist = b.radius + ring_thickness;
                    
                    if(dist_to_tube < min_dist) {
                        const v = b.p.clone().divideScalar(b.m);
                        const v_ring = b_ring.p.clone().divideScalar(b_ring.m);
                        const v_rel = v.clone().sub(v_ring);
                        if(v_rel.dot(r_vec) < 0) {
                            const n = r_vec.clone().normalize();
                            const m1 = b.m;
                            const m2 = b_ring.m;
                            
                            const dot1 = v.clone().sub(v_ring).dot(r_vec) / (dist_to_tube*dist_to_tube);
                            const v1_new = v.clone().sub(r_vec.clone().multiplyScalar(2*m2/(m1+m2) * dot1));
                            
                            const dot2 = v_ring.clone().sub(v).dot(r_vec.clone().multiplyScalar(-1)) / (dist_to_tube*dist_to_tube);
                            const v_ring_new = v_ring.clone().sub(r_vec.clone().multiplyScalar(-1).multiplyScalar(2*m1/(m1+m2) * dot2));
                            
                            b.p = v1_new.multiplyScalar(m1);
                            b_ring.p = v_ring_new.multiplyScalar(m2);
                        }
                        const overlap = min_dist - dist_to_tube;
                        const n = r_vec.clone().normalize();
                        const total_m = b.m + b_ring.m;
                        b.pos.add(n.clone().multiplyScalar(overlap * b_ring.m/total_m));
                        b_ring.pos.sub(n.clone().multiplyScalar(overlap * b.m/total_m));
                    }
                }
            }
            
            // Sync Meshes
            for(let b of bodies) b.mesh.position.copy(b.pos);
            b_ring.mesh.position.copy(b_ring.pos);
        }

        let trailTimer = 0;
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            
            if (isRunning) {
                for(let i=0; i<10; i++) {
                    stepPhysics();
                }
                
                trailTimer++;
                if (trailTimer >= 2) {
                    for(let b of bodies) b.updateTrail();
                    trailTimer = 0;
                }
            }
            
            composer.render();
        }

        init();
    </script>
</body>
</html>
