<!DOCTYPE html>
<html>

<head>
    <title>N-Pendulum Sim - Stable Energy</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <style>
        body {
            margin: 0;
            background: #141414;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(20, 20, 20, 0.85);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #333;
            z-index: 10;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            min-width: 250px;
        }

        .ui-row {
            margin-bottom: 15px;
        }

        .btn {
            width: 100%;
            padding: 10px;
            background: #2a2a2a;
            color: #fff;
            border: 1px solid #444;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #3a3a3a;
        }

        .ui-label {
            font-size: 14px;
            color: #ddd;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }

        .slider {
            width: 100%;
            cursor: pointer;
            accent-color: #64ffda;
        }

        #energy-drift {
            font-family: monospace;
            font-size: 14px;
            padding: 8px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 6px;
            margin-bottom: 15px;
            display: block;
        }

        .instructions {
            margin-top: 15px;
            color: #888;
            font-size: 12px;
            line-height: 1.4;
            border-top: 1px solid #333;
            padding-top: 10px;
        }
    </style>
</head>

<body>
    <div id="ui-container">
        <div id="energy-drift">Energy Drift: 0.00000%</div>

        <div class="ui-row">
            <div class="ui-label">
                <span>Number of Links</span>
                <span id="n-display" style="color: #64ffda; font-weight: bold;">4</span>
            </div>
            <input type="range" id="n-slider" class="slider" min="1" max="15" value="4">
        </div>

        <div class="ui-row">
            <button id="pause-btn" class="btn">Start Simulation</button>
        </div>

        <div class="instructions">
            <strong>Controls:</strong><br>
            • Click and drag near any round mass to grab and throw it.<br>
            • Energy meter is paused while grabbing to allow intentional energy injections.
        </div>
    </div>

    <script>
        // --- UI & RENDER LOGIC START ---
        let N = 4;
        let traceHistory = [];

        // State received from worker
        let state = {
            angles: [],
            lengths: [],
            masses: [],
            currentEnergy: 0,
            initialEnergy: 0
        };

        // Interaction
        let draggedMass = -1;
        let isPaused = true;
        let physicsWorker;

        function setup() {
            createCanvas(windowWidth, windowHeight);

            // Initialize Web Worker
            physicsWorker = new Worker('worker_npendulum.js');

            physicsWorker.onmessage = function (e) {
                if (e.data.type === 'state') {
                    state = e.data;
                }
            };

            document.getElementById('n-slider').addEventListener('input', function (e) {
                let newN = parseInt(e.target.value);
                document.getElementById('n-display').innerText = newN;
                initPendulum(newN);
            });

            document.getElementById('pause-btn').addEventListener('click', function (e) {
                isPaused = !isPaused;
                e.target.innerText = isPaused ? "Start Simulation" : "Pause Simulation";
                physicsWorker.postMessage({ type: 'pause', isPaused: isPaused });
            });

            initPendulum(parseInt(document.getElementById('n-slider').value));
        }

        function initPendulum(newN) {
            N = newN;
            traceHistory = [];
            draggedMass = -1;

            let l = Math.min(100, (windowHeight * 0.35) / N);

            physicsWorker.postMessage({
                type: 'init',
                N: N,
                l: l
            });
        }

        function draw() {
            background(20);

            updateEnergyMeter();

            if (state.angles.length === 0) return; // Wait for first frame from worker

            push();
            translate(width / 1.7, height / 2);
            let x = 0, y = 0;

            // Draw links and masses
            for (let i = 0; i < N; i++) {
                let nextX = x + state.lengths[i] * Math.sin(state.angles[i]);
                let nextY = y + state.lengths[i] * Math.cos(state.angles[i]);

                stroke(255, 150);
                strokeWeight(3);
                line(x, y, nextX, nextY);

                // Highlight grabbed mass
                if (i === draggedMass) {
                    fill(100, 255, 200);
                    stroke(255);
                    strokeWeight(2);
                } else {
                    fill(255, 100, 100);
                    noStroke();
                }

                circle(nextX, nextY, state.masses[i] * 1.5);

                x = nextX;
                y = nextY;

                if (i === N - 1 && (!isPaused || draggedMass !== -1)) {
                    traceHistory.push({ x: x, y: y });
                    if (traceHistory.length > 500) traceHistory.shift();
                }
            }

            // Draw trace history
            noFill();
            strokeWeight(2);
            stroke(100, 200, 255, 150);
            beginShape();
            for (let p of traceHistory) vertex(p.x, p.y);
            endShape();
            pop();
        }

        function mousePressed() {
            let mx = mouseX - width / 1.7;
            let my = mouseY - height / 2;
            let x = 0, y = 0;
            let minDist = 40; // grab radius
            draggedMass = -1;

            if (state.angles.length === 0) return;

            for (let i = 0; i < N; i++) {
                x += state.lengths[i] * Math.sin(state.angles[i]);
                y += state.lengths[i] * Math.cos(state.angles[i]);
                let d = dist(mx, my, x, y);
                if (d < minDist) {
                    minDist = d;
                    draggedMass = i;
                }
            }

            if (draggedMass !== -1) {
                physicsWorker.postMessage({
                    type: 'drag',
                    draggedMass: draggedMass,
                    targetX: mx,
                    targetY: my
                });
            }
        }

        function mouseDragged() {
            if (draggedMass !== -1) {
                let mx = mouseX - width / 1.7;
                let my = mouseY - height / 2;
                physicsWorker.postMessage({
                    type: 'drag',
                    draggedMass: draggedMass,
                    targetX: mx,
                    targetY: my
                });
            }
        }

        function mouseReleased() {
            if (draggedMass !== -1) {
                draggedMass = -1;
                physicsWorker.postMessage({ type: 'release' });
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
            initPendulum(N);
        }

        function updateEnergyMeter() {
            let driftEl = document.getElementById('energy-drift');
            if (draggedMass !== -1) {
                driftEl.style.color = '#fff';
                driftEl.innerText = "Energy Drift: (Injecting Power...)";
                return;
            }

            let drift = ((state.currentEnergy - state.initialEnergy) / state.initialEnergy) * 100;

            if (isNaN(drift) || Math.abs(state.initialEnergy) < 1e-4) {
                driftEl.style.color = '#ff6464';
                driftEl.innerText = "Energy Drift: NaN (Math Error)";
            } else {
                driftEl.style.color = Math.abs(drift) < 0.2 ? '#64ffda' : '#ff6464';
                driftEl.innerText = `Energy Drift: ${drift >= 0 ? '+' : ''}${drift.toFixed(5)}%`;
            }
        }
    </script>
</body>

</html>
