<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Stable Orbits</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #050505; }
        canvas { display: block; }
        #controls {
            position: absolute;
            top: 15px;
            left: 15px;
            color: #ededed;
            font-family: 'JetBrains Mono', monospace;
            background: rgba(13, 13, 13, 0.85);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #1f1f1f;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
        }
        select, button {
            background: rgba(255, 255, 255, 0.05);
            color: #64ffda;
            border: 1px solid #64ffda;
            padding: 5px 10px;
            font-family: 'JetBrains Mono', monospace;
            border-radius: 4px;
            cursor: pointer;
            outline: none;
        }
        select:hover, button:hover {
            background: rgba(100, 255, 218, 0.1);
        }
        .help-text {
            color: #888;
            font-size: 0.8rem;
            margin-top: 5px;
        }
    </style>
    <!-- GlowScript requirements -->
    <link type="text/css" href="https://www.glowscript.org/css/redmond/2.1/jquery-ui.custom.css" rel="stylesheet" />
    <link type="text/css" href="https://www.glowscript.org/css/ide.css" rel="stylesheet" />
    <script type="text/javascript" src="https://www.glowscript.org/lib/jquery/2.1/jquery.min.js"></script>
    <script type="text/javascript" src="https://www.glowscript.org/lib/jquery/2.1/jquery-ui.custom.min.js"></script>
    <script type="text/javascript" src="https://www.glowscript.org/package/glow.3.2.min.js"></script>
    <script type="text/javascript" src="https://www.glowscript.org/package/RSrun.3.2.min.js"></script>
</head>
<body>
    <div id="controls">
        <label for="configSelect">Orbital Configuration:</label>
        <select id="configSelect" onchange="window.changeConfig(this.value)">
            <option value="figure8">Figure-8 (3-Body)</option>
            <option value="butterfly">Butterfly (3-Body)</option>
            <option value="moth">Moth (3-Body)</option>
            <option value="yinyang">Yin-Yang (3-Body)</option>
            <option value="binary">Binary Star System</option>
            <option value="sunEarthMoon">Sun-Earth-Moon</option>
            <option value="trojans">Lagrange Trojans</option>
        </select>
        <div class="help-text">Right-click + drag to spin.<br>Scroll to zoom.</div>
    </div>

    <div id="glowscript" class="glowscript"></div>

    <script type="text/javascript">
        window.sim_running = false;
        window.current_config = "figure8";
        window.changeConfig = function(val) {
            window.current_config = val;
        };

        // Listen for start/stop from parent
        window.addEventListener('message', function(e) {
            if (e.data.type === 'start') {
                window.sim_running = true;
            } else if (e.data.type === 'stop') {
                window.sim_running = false;
            }
        });
        
        ;(function () {
            async function __main__() {
                "use strict";
                var scene = canvas({title: "", width: window.innerWidth, height: window.innerHeight, background: color.gray(0.05)});
                scene.camera.pos = vec(0, 0, 800);
                scene.ambient = color.gray(0.2);
                scene.autoscale = false;
                scene.center = vec(0, 0, 0);


                var bodies = [];
                var G = 1.0;
                var dt = 0.01;

                function rotate3D(v, pitch, yaw, roll) {
                    var y1 = v.y*Math.cos(pitch) - v.z*Math.sin(pitch);
                    var z1 = v.y*Math.sin(pitch) + v.z*Math.cos(pitch);
                    var x2 = v.x*Math.cos(yaw) + z1*Math.sin(yaw);
                    var z2 = -v.x*Math.sin(yaw) + z1*Math.cos(yaw);
                    var x3 = x2*Math.cos(roll) - y1*Math.sin(roll);
                    var y3 = x2*Math.sin(roll) + y1*Math.cos(roll);
                    return vec(x3, y3, z2);
                }

                function clear_bodies() {
                    for (var i = 0; i < bodies.length; i++) {
                        var b = bodies[i];
                        b.visible = false;
                        if (b.glow) b.glow.visible = false;
                        if (b.light) b.light.visible = false;
                        b.clear_trail();
                    }
                    bodies = [];
                }

                function load_figure8() {
                    clear_bodies();
                    G = 10000.0;
                    dt = 0.01;
                    var scale = 100;
                    var vscale = 10;
                    
                    var pitch = Math.PI / 4;
                    var yaw = Math.PI / 6;
                    
                    var p1 = rotate3D(vec(0.97000436, -0.24308753, 0), pitch, yaw, 0);
                    var p2 = rotate3D(vec(-0.97000436, 0.24308753, 0), pitch, yaw, 0);
                    var p3 = rotate3D(vec(0, 0, 0), pitch, yaw, 0);
                    
                    var v3_base = vec(-0.93240737, -0.86473146, 0);
                    var v1 = rotate3D(vec(-v3_base.x/2, -v3_base.y/2, 0), pitch, yaw, 0);
                    var v2 = rotate3D(vec(-v3_base.x/2, -v3_base.y/2, 0), pitch, yaw, 0);
                    var v3 = rotate3D(v3_base, pitch, yaw, 0);
                    
                    var colors = [color.red, color.cyan, color.blue];
                    var pos_arr = [p1, p2, p3];
                    var v_arr = [v1, v2, v3];
                    
                    for (var i = 0; i < 3; i++) {
                        var b = sphere({pos: vec(pos_arr[i].x*scale, pos_arr[i].y*scale, pos_arr[i].z*scale), radius: 15, color: colors[i], make_trail: true, trail_type: "curve", retain: 350, trail_radius: 2, emissive: true});
                        b.m = 1.0;
                        b.v = vec(v_arr[i].x*vscale, v_arr[i].y*vscale, v_arr[i].z*vscale);
                        b.light = local_light({pos: b.pos, color: b.color});
                        b.glow = sphere({pos: b.pos, radius: b.radius*2.0, color: b.color, opacity: 0.2, shininess: 0, emissive: true});
                        bodies.push(b);
                    }
                    
                    scene.camera.pos = vec(0, 0, 1200);
                }

                function load_periodic_3body(vx, vy, zoom) {
                    clear_bodies();
                    var scale = 200;
                    G = Math.pow(scale, 3);
                    dt = 0.002; 
                    
                    var pitch = Math.PI / 4;
                    var yaw = Math.PI / 6;
                    
                    var p1 = rotate3D(vec(-1, 0, 0), pitch, yaw, 0);
                    var p2 = rotate3D(vec(1, 0, 0), pitch, yaw, 0);
                    var p3 = rotate3D(vec(0, 0, 0), pitch, yaw, 0);
                    
                    var v1 = rotate3D(vec(vx, vy, 0), pitch, yaw, 0);
                    var v2 = rotate3D(vec(vx, vy, 0), pitch, yaw, 0);
                    var v3 = rotate3D(vec(-2*vx, -2*vy, 0), pitch, yaw, 0);
                    
                    var colors = [color.red, color.cyan, color.blue];
                    var pos_arr = [p1, p2, p3];
                    var v_arr = [v1, v2, v3];
                    
                    for (var i = 0; i < 3; i++) {
                        var b = sphere({pos: vec(pos_arr[i].x*scale, pos_arr[i].y*scale, pos_arr[i].z*scale), radius: 15, color: colors[i], make_trail: true, trail_type: "curve", retain: 800, trail_radius: 2, emissive: true});
                        b.m = 1.0;
                        b.v = vec(v_arr[i].x*scale, v_arr[i].y*scale, v_arr[i].z*scale);
                        b.light = local_light({pos: b.pos, color: b.color});
                        b.glow = sphere({pos: b.pos, radius: b.radius*2.0, color: b.color, opacity: 0.2, shininess: 0, emissive: true});
                        bodies.push(b);
                    }
                    
                    scene.camera.pos = vec(0, 0, zoom || 1200);
                }

                function load_butterfly() { load_periodic_3body(0.30689, 0.12551, 1500); }
                function load_moth() { load_periodic_3body(0.46444, 0.39606, 1500); }
                function load_yinyang() { load_periodic_3body(0.51394, 0.30474, 1500); }

                function load_binary() {
                    clear_bodies();
                    G = 1.0;
                    dt = 0.05;
                    
                    var vStar = Math.sqrt(G * 100 / (4 * 50));
                    var s0_p = rotate3D(vec(-50, 0, 0), Math.PI/6, 0, 0);
                    var s0_v = rotate3D(vec(0, vStar, 0), Math.PI/6, 0, 0);
                    
                    var s1_p = rotate3D(vec(50, 0, 0), Math.PI/6, 0, 0);
                    var s1_v = rotate3D(vec(0, -vStar, 0), Math.PI/6, 0, 0);
                    
                    var rPlanet = 200;
                    var aPlanet = G * 100 / Math.pow(rPlanet - 50, 2) + G * 100 / Math.pow(rPlanet + 50, 2);
                    var vPlanet = Math.sqrt(rPlanet * aPlanet);
                    var p_p = rotate3D(vec(rPlanet, 0, 0), -Math.PI/8, Math.PI/6, 0);
                    var p_v = rotate3D(vec(0, vPlanet, 0), -Math.PI/8, Math.PI/6, 0);
                    
                    var stars = [
                        {p: s0_p, v: s0_v, m: 100, r: 30, c: color.orange},
                        {p: s1_p, v: s1_v, m: 100, r: 30, c: vec(1, 0.6, 0.2)},
                        {p: p_p, v: p_v, m: 0.1, r: 12, c: color.cyan}
                    ];
                    
                    for (var i=0; i<stars.length; i++) {
                        var s = stars[i];
                        var b = sphere({pos: s.p, radius: s.r, color: s.c, make_trail: true, trail_type: "curve", retain: 350, trail_radius: 1.5, emissive: true});
                        b.m = s.m;
                        b.v = s.v;
                        if (s.m > 50) {
                            b.light = local_light({pos: b.pos, color: b.color});
                            b.glow = sphere({pos: b.pos, radius: b.radius*1.5, color: b.color, opacity: 0.3, shininess: 0, emissive: true});
                        }
                        bodies.push(b);
                    }
                    scene.camera.pos = vec(0, 0, 1500);
                }

                function load_sunEarthMoon() {
                    clear_bodies();
                    G = 1.0;
                    dt = 0.02;
                    
                    var rEarth = 250;
                    var vEarth = Math.sqrt(G * 1000 / rEarth);
                    var e_p = rotate3D(vec(rEarth, 0, 0), Math.PI/6, Math.PI/4, 0);
                    var e_v = rotate3D(vec(0, vEarth, 0), Math.PI/6, Math.PI/4, 0);
                    
                    var rMoon = 25;
                    var vMoonMag = Math.sqrt(G * 10 / rMoon);
                    var m_p_local = rotate3D(vec(rMoon, 0, 0), -Math.PI/4, 0, 0);
                    var m_v_local = rotate3D(vec(0, vMoonMag, 0), -Math.PI/4, 0, 0);
                    
                    var objs = [
                        {p: vec(0,0,0), v: vec(0,0,0), m: 1000, r: 40, c: color.yellow},
                        {p: e_p, v: e_v, m: 10, r: 15, c: vec(0.4, 0.6, 1)},
                        {p: vec(e_p.x + m_p_local.x, e_p.y + m_p_local.y, e_p.z + m_p_local.z), v: vec(e_v.x + m_v_local.x, e_v.y + m_v_local.y, e_v.z + m_v_local.z), m: 0.1, r: 8, c: color.gray(0.8)}
                    ];
                    
                    for (var i=0; i<objs.length; i++) {
                        var s = objs[i];
                        var b = sphere({pos: s.p, radius: s.r, color: s.c, make_trail: true, trail_type: "curve", retain: 400, trail_radius: 1.5, emissive: true});
                        b.m = s.m;
                        b.v = s.v;
                        if (s.m > 50) {
                            b.light = local_light({pos: b.pos, color: b.color});
                            b.glow = sphere({pos: b.pos, radius: b.radius*1.5, color: b.color, opacity: 0.3, shininess: 0, emissive: true});
                        }
                        bodies.push(b);
                    }
                    scene.camera.pos = vec(0, 0, 2000);
                }

                function load_trojans() {
                    clear_bodies();
                    G = 1.0;
                    dt = 0.05;
                    
                    var rJup = 250;
                    var vJup = Math.sqrt(G * 1000 / rJup);
                    var tilt = Math.PI / 5;
                    
                    var j_p = rotate3D(vec(rJup, 0, 0), tilt, 0, 0);
                    var j_v = rotate3D(vec(0, vJup, 0), tilt, 0, 0);
                    
                    var angle4 = Math.PI / 3;
                    var l4_p = rotate3D(vec(rJup * Math.cos(angle4), rJup * Math.sin(angle4), 0), tilt, 0, 0);
                    var l4_v = rotate3D(vec(-vJup * Math.sin(angle4), vJup * Math.cos(angle4), 0), tilt, 0, 0);
                    
                    var angle5 = -Math.PI / 3;
                    var l5_p = rotate3D(vec(rJup * Math.cos(angle5), rJup * Math.sin(angle5), 0), tilt, 0, 0);
                    var l5_v = rotate3D(vec(-vJup * Math.sin(angle5), vJup * Math.cos(angle5), 0), tilt, 0, 0);
                    
                    var objs = [
                        {p: vec(0,0,0), v: vec(0,0,0), m: 1000, r: 40, c: color.yellow},
                        {p: j_p, v: j_v, m: 10, r: 15, c: vec(0.4, 0.6, 1)},
                        {p: l4_p, v: l4_v, m: 0.01, r: 10, c: color.red},
                        {p: l5_p, v: l5_v, m: 0.01, r: 10, c: color.red}
                    ];
                    
                    for (var i=0; i<objs.length; i++) {
                        var s = objs[i];
                        var b = sphere({pos: s.p, radius: s.r, color: s.c, make_trail: true, trail_type: "curve", retain: 350, trail_radius: 1.5, emissive: true});
                        b.m = s.m;
                        b.v = s.v;
                        if (s.m > 50) {
                            b.light = local_light({pos: b.pos, color: b.color});
                            b.glow = sphere({pos: b.pos, radius: b.radius*1.5, color: b.color, opacity: 0.3, shininess: 0, emissive: true});
                        }
                        bodies.push(b);
                    }
                    scene.camera.pos = vec(0, 0, 2000);
                }

                function get_derivatives(state) {
                    var n = bodies.length;
                    var dy = new Array(n*6).fill(0);
                    for (var i = 0; i < n; i++) {
                        var idx = i * 6;
                        dy[idx]   = state[idx+3];
                        dy[idx+1] = state[idx+4];
                        dy[idx+2] = state[idx+5];
                        
                        var ax = 0;
                        var ay = 0;
                        var az = 0;
                        for (var j = 0; j < n; j++) {
                            if (i === j) continue;
                            var jdx = j * 6;
                            var dx = state[jdx] - state[idx];
                            var dy_pos = state[jdx+1] - state[idx+1];
                            var dz = state[jdx+2] - state[idx+2];
                            
                            var distSq = dx*dx + dy_pos*dy_pos + dz*dz;
                            var dist = Math.sqrt(distSq + 0.1);
                            
                            var force = (G * bodies[j].m) / (dist * distSq);
                            ax += force * dx;
                            ay += force * dy_pos;
                            az += force * dz;
                        }
                        dy[idx+3] = ax;
                        dy[idx+4] = ay;
                        dy[idx+5] = az;
                    }
                    return dy;
                }

                function rk4_step() {
                    var n = bodies.length;
                    var state = new Array(n*6).fill(0);
                    for (var i = 0; i < n; i++) {
                        var idx = i * 6;
                        state[idx]   = bodies[i].pos.x;
                        state[idx+1] = bodies[i].pos.y;
                        state[idx+2] = bodies[i].pos.z;
                        state[idx+3] = bodies[i].v.x;
                        state[idx+4] = bodies[i].v.y;
                        state[idx+5] = bodies[i].v.z;
                    }
                        
                    var k1 = get_derivatives(state);
                    
                    var temp = new Array(n*6).fill(0);
                    for (var i = 0; i < n*6; i++) temp[i] = state[i] + k1[i]*dt*0.5;
                    var k2 = get_derivatives(temp);
                    
                    for (var i = 0; i < n*6; i++) temp[i] = state[i] + k2[i]*dt*0.5;
                    var k3 = get_derivatives(temp);
                    
                    for (var i = 0; i < n*6; i++) temp[i] = state[i] + k3[i]*dt;
                    var k4 = get_derivatives(temp);
                    
                    for (var i = 0; i < n; i++) {
                        var idx = i * 6;
                        bodies[i].pos.x += (k1[idx]   + 2.0*k2[idx]   + 2.0*k3[idx]   + k4[idx])   * dt / 6.0;
                        bodies[i].pos.y += (k1[idx+1] + 2.0*k2[idx+1] + 2.0*k3[idx+1] + k4[idx+1]) * dt / 6.0;
                        bodies[i].pos.z += (k1[idx+2] + 2.0*k2[idx+2] + 2.0*k3[idx+2] + k4[idx+2]) * dt / 6.0;
                        bodies[i].v.x   += (k1[idx+3] + 2.0*k2[idx+3] + 2.0*k3[idx+3] + k4[idx+3]) * dt / 6.0;
                        bodies[i].v.y   += (k1[idx+4] + 2.0*k2[idx+4] + 2.0*k3[idx+4] + k4[idx+4]) * dt / 6.0;
                        bodies[i].v.z   += (k1[idx+5] + 2.0*k2[idx+5] + 2.0*k3[idx+5] + k4[idx+5]) * dt / 6.0;

                        if (bodies[i].glow) bodies[i].glow.pos = bodies[i].pos;
                        if (bodies[i].light) bodies[i].light.pos = bodies[i].pos;
                    }
                }

                var current_config_internal = "";

                while (true) {
                    await rate(60);
                    
                    if (window.current_config !== current_config_internal) {
                        current_config_internal = window.current_config;
                        if (current_config_internal === "figure8") load_figure8();
                        else if (current_config_internal === "butterfly") load_butterfly();
                        else if (current_config_internal === "moth") load_moth();
                        else if (current_config_internal === "yinyang") load_yinyang();
                        else if (current_config_internal === "binary") load_binary();
                        else if (current_config_internal === "sunEarthMoon") load_sunEarthMoon();
                        else if (current_config_internal === "trojans") load_trojans();
                    }
                        
                    if (window.sim_running) {
                        for (var i=0; i<10; i++) {
                            rk4_step();
                        }
                    }
                }
            }
            $(function () { window.__context = { glowscript_container: $("#glowscript").removeAttr("id") }; __main__() })
        })();
    </script>
</body>
</html>
