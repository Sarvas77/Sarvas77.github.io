<!DOCTYPE html>
<html>

<head>
    <title>My Galaxy Simulation</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f15;
            color: #ececec;
            text-align: center;
            margin: 0;
            padding: 30px;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 5px;
            font-size: 2.5em;
            color: #ffaa55;
            text-shadow: 0 0 10px rgba(255, 170, 85, 0.5);
        }

        p {
            margin-bottom: 30px;
            color: #aaa;
            font-size: 1.1em;
        }

        iframe {
            border: 2px solid #333;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            max-width: 100%;
            background-color: black;
        }
    </style>
</head>

<body>
    <h1>Welcome to my 3D Galaxy!</h1>
    <p>This simulation was built using VPython and integrated using an iframe.</p>

    <iframe src="GalaxySim.html" width="1000" height="800" allowfullscreen></iframe>
</body>

</html>
