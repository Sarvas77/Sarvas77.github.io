<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Galaxy Simulation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #050505; }
        canvas { display: block; }
        #ui-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }
        #controls {
            position: absolute; top: 20px; right: 20px;
            color: #ededed; font-family: 'JetBrains Mono', monospace, sans-serif;
            background: rgba(13, 13, 13, 0.85); padding: 15px 25px; border-radius: 12px;
            border: 1px solid #1f1f1f; display: flex; flex-direction: column; align-items: center; gap: 12px;
            backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            pointer-events: auto;
        }
        .help-text { color: #888; font-size: 11px; text-align: center; line-height: 1.4; }
    </style>
</head>
<body>
    <div id="ui-container">
        <div id="controls">
            <div style="font-weight: 600; font-size: 14px; letter-spacing: 1px; color: #ffaa00;">GALAXY DYNAMICS</div>
            <div class="help-text">Left Click + Drag to rotate<br>Scroll to zoom</div>
        </div>
    </div>

    <!-- Three.js Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

    <script>
        let scene, camera, renderer, composer, controls;
        let isRunning = false;
        
        // Physics Consts
        const G = 1;
        const BLACK_HOLE_MASS = 150000;
        const NUM_SPIRAL_STARS = 20000; // Drastically increased because Three.js Points are very fast
        const NUM_BULGE_STARS = 10000;
        const DT = 0.05;
        
        let starsGeometry;
        let starData = []; // To hold r, angle, omega, y

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020205);
            scene.fog = new THREE.FogExp2(0x020205, 0.001);
            
            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 5000);
            camera.position.set(0, 200, 300);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);
            
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            
            const renderScene = new THREE.RenderPass(scene, camera);
            const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 2.0, 0.5, 0.1);
            bloomPass.threshold = 0;
            bloomPass.strength = 1.8;
            bloomPass.radius = 0.8;
            
            composer = new THREE.EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);
            
            window.addEventListener('resize', onWindowResize);
            
            window.addEventListener('message', (e) => {
                if(e.data.type === 'start') isRunning = true;
                if(e.data.type === 'stop') isRunning = false;
            });
            
            buildGalaxy();
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // Box-Muller transform for gaussian distribution
        function gauss(mu, sigma) {
            let u1 = Math.random();
            let u2 = Math.random();
            while(u1 === 0) u1 = Math.random();
            let z0 = Math.sqrt(-2.0 * Math.log(u1)) * Math.cos(2.0 * Math.PI * u2);
            return z0 * sigma + mu;
        }

        function buildGalaxy() {
            // Central Supermassive Black Hole (Glow)
            const bhGeo = new THREE.SphereGeometry(6, 32, 32);
            const bhMat = new THREE.MeshBasicMaterial({ color: 0xffaa00 });
            const bh = new THREE.Mesh(bhGeo, bhMat);
            scene.add(bh);
            
            const totalStars = NUM_SPIRAL_STARS + NUM_BULGE_STARS;
            
            starsGeometry = new THREE.BufferGeometry();
            const positions = new Float32Array(totalStars * 3);
            const colors = new Float32Array(totalStars * 3);
            const sizes = new Float32Array(totalStars);
            
            const spiral_a = 15;
            const spiral_b = 0.3;
            
            let idx = 0;
            
            // Generate Spiral Arms
            for(let i=0; i<NUM_SPIRAL_STARS; i++) {
                const arm = i % 2;
                const theta = 1 + 9 * Math.random();
                
                let r = spiral_a * Math.exp(spiral_b * theta);
                r += gauss(0, 15);
                if (r < 10) r = 10;
                
                const angle = theta + arm * Math.PI;
                const y = gauss(0, 4);
                
                const v = Math.sqrt(G * BLACK_HOLE_MASS / r);
                const omega = v / r;
                
                starData.push({ r: r, angle: angle, y: y, omega: omega });
                
                positions[idx*3] = r * Math.cos(angle);
                positions[idx*3+1] = y;
                positions[idx*3+2] = r * Math.sin(angle);
                
                // Color: Hot blue on edges, shifting to white/yellow near core
                const colorMix = Math.min(1.0, r / 250.0);
                const color = new THREE.Color();
                color.setHSL(0.6 - colorMix * 0.1, 0.8, 0.6 + Math.random()*0.4);
                
                colors[idx*3] = color.r;
                colors[idx*3+1] = color.g;
                colors[idx*3+2] = color.b;
                
                sizes[idx] = 1.0 + Math.random() * 1.5;
                
                idx++;
            }
            
            // Generate Central Bulge
            for(let i=0; i<NUM_BULGE_STARS; i++) {
                let r = Math.abs(gauss(0, 20));
                if (r < 6) r = 6;
                
                const angle = Math.random() * 2 * Math.PI;
                const y = gauss(0, 8) * Math.exp(-r / 30);
                
                const v = Math.sqrt(G * BLACK_HOLE_MASS / r) * 0.7; // Bulge stars orbit slower/chaotically
                const omega = v / r;
                
                starData.push({ r: r, angle: angle, y: y, omega: omega });
                
                positions[idx*3] = r * Math.cos(angle);
                positions[idx*3+1] = y;
                positions[idx*3+2] = r * Math.sin(angle);
                
                // Color: Warm orange/yellow for old bulge stars
                const color = new THREE.Color();
                color.setHSL(0.08 + Math.random()*0.05, 0.9, 0.5 + Math.random()*0.5);
                
                colors[idx*3] = color.r;
                colors[idx*3+1] = color.g;
                colors[idx*3+2] = color.b;
                
                sizes[idx] = 1.5 + Math.random() * 2.0;
                
                idx++;
            }
            
            starsGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            starsGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            starsGeometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            
            // Custom Shader Material for glowy circular particles
            const starMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    time: { value: 0 }
                },
                vertexShader: `
                    attribute float size;
                    attribute vec3 color;
                    varying vec3 vColor;
                    void main() {
                        vColor = color;
                        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                        gl_PointSize = size * (300.0 / -mvPosition.z);
                        gl_Position = projectionMatrix * mvPosition;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    void main() {
                        // Circular soft particle
                        vec2 xy = gl_PointCoord.xy - vec2(0.5);
                        float ll = length(xy);
                        if(ll > 0.5) discard;
                        
                        // Soft edge
                        float alpha = (0.5 - ll) * 2.0;
                        gl_FragColor = vec4(vColor, alpha);
                    }
                `,
                transparent: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending
            });
            
            const starSystem = new THREE.Points(starsGeometry, starMaterial);
            scene.add(starSystem);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            
            if (isRunning && starsGeometry) {
                const positions = starsGeometry.attributes.position.array;
                
                for(let i=0; i<starData.length; i++) {
                    const sd = starData[i];
                    sd.angle += sd.omega * DT;
                    
                    positions[i*3] = sd.r * Math.cos(sd.angle);
                    // positions[i*3+1] is y, stays same
                    positions[i*3+2] = sd.r * Math.sin(sd.angle);
                }
                
                starsGeometry.attributes.position.needsUpdate = true;
            }
            
            composer.render();
        }

        // Boot
        init();
    </script>
</body>
</html>
