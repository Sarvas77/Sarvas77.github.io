<!DOCTYPE html>
<html>

<head>
    <title>N-Pendulum Sim - Stable Energy</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <style>
        body {
            margin: 0;
            background: #141414;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #ui-container {
            position: absolute;
            top: 5px;
            left: 5px;
            color: white;
            background: rgba(20, 20, 20, 0.85);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #333;
            z-index: 10;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            min-width: 250px;
            transform: scale(0.7);
            transform-origin: top left;
        }

        .ui-row {
            margin-bottom: 15px;
        }

        .ui-label {
            font-size: 14px;
            color: #ddd;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }

        .slider {
            width: 100%;
            cursor: pointer;
            accent-color: #64ffda;
        }



        .instructions {
            margin-top: 15px;
            color: #888;
            font-size: 12px;
            line-height: 1.4;
            border-top: 1px solid #333;
            padding-top: 10px;
        }
    </style>
</head>

<body>
    <div id="ui-container">
        <div class="ui-row" style="margin-bottom: 20px;">
            <div class="ui-label">
                <span>System Energy Stability</span>
                <span id="energy-text" style="color: #64ffda; font-family: monospace;">+0.00000%</span>
            </div>
            <div
                style="width: 100%; height: 8px; background: rgba(0,0,0,0.6); border-radius: 4px; overflow: hidden; margin-top: 8px; border: 1px solid #333;">
                <div id="energy-bar"
                    style="width: 50%; height: 100%; background: #64ffda; transition: width 0.1s ease-out, background-color 0.2s;">
                </div>
            </div>
        </div>

        <div class="ui-row">
            <div class="ui-label">
                <span>Number of Links</span>
                <span id="n-display" style="color: #64ffda; font-weight: bold;">4</span>
            </div>
            <input type="range" id="n-slider" class="slider" min="1" max="15" value="4">
        </div>

        <div class="ui-row">
            <div class="ui-label">
                <span>Rope Stiffness</span>
                <span id="k-display" style="color: #64ffda; font-weight: bold;">0</span>
            </div>
            <input type="range" id="k-slider" class="slider" min="0" max="500000" step="10000" value="0">
        </div>

        <div class="ui-row">
            <div class="ui-label">
                <span>Internal Friction</span>
                <span id="d-display" style="color: #64ffda; font-weight: bold;">0.0</span>
            </div>
            <input type="range" id="d-slider" class="slider" min="0" max="100" step="1" value="0">
        </div>

        <div class="ui-row">
            <label
                style="cursor: pointer; display: flex; align-items: center; justify-content: space-between; width: 100%;">
                <span style="font-size: 14px; color: #ddd;">Rope Mode (Self-Collision)</span>
                <input type="checkbox" id="rope-mode" style="accent-color: #64ffda; width: 18px; height: 18px;">
            </label>
        </div>

        <div class="ui-row"
            style="display: flex; gap: 10px; margin-top: 20px; border-top: 1px solid #333; padding-top: 15px;">
            <button id="play-pause-btn"
                style="flex: 1; padding: 10px; background: #ffb86c; color: #141414; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.2s;">
                START SIMULATION
            </button>
            <button id="reset-btn"
                style="flex: 1; padding: 10px; background: #444; color: #fff; border: 1px solid #666; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.2s;">
                RESET
            </button>
        </div>

        <div class="instructions">
            <strong>Controls:</strong><br>
            • Click and drag near any round mass to grab and throw it.<br>
            • Energy meter is paused while grabbing to allow intentional energy injections.
        </div>
    </div>

    <script>
        // --- UI & RENDER LOGIC START ---
        let TOTAL_LENGTH = 0;
        let N = 4;
        let traceHistory = [];

        // State received from worker
        let state = {
            isRopeMode: false,
            angles: [],
            lengths: [],
            masses: [],
            rope_x: [],
            rope_y: [],
            currentEnergy: 0,
            initialEnergy: 0,
            accumulatedFrictionLoss: 0
        };

        // Interaction
        let draggedMass = -1;
        let isRopeMode = false;
        let isPaused = true;
        let physicsWorker;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            TOTAL_LENGTH = windowHeight * 0.45;

            // Initialize Web Worker
            physicsWorker = new Worker('worker_physical.js');

            physicsWorker.onmessage = function (e) {
                if (e.data.type === 'state') {
                    state = e.data;
                }
            };

            document.getElementById('n-slider').addEventListener('input', function (e) {
                let newN = parseInt(e.target.value);
                document.getElementById('n-display').innerText = newN;
                N = newN;
                if (isRopeMode) {
                    initRope(newN);
                } else {
                    initPendulum(newN);
                }
            });

            document.getElementById('k-slider').addEventListener('input', function (e) {
                let k_bend = parseInt(e.target.value);
                document.getElementById('k-display').innerText = k_bend;
                physicsWorker.postMessage({ type: 'update_params', k_bend: k_bend, d_friction: parseInt(document.getElementById('d-slider').value) * 10000, recalcEnergy: true });
            });

            document.getElementById('d-slider').addEventListener('input', function (e) {
                let d_friction = parseInt(e.target.value) * 10000;
                document.getElementById('d-display').innerText = parseInt(e.target.value);
                physicsWorker.postMessage({ type: 'update_params', k_bend: parseInt(document.getElementById('k-slider').value), d_friction: d_friction, recalcEnergy: false });
            });

            document.getElementById('rope-mode').addEventListener('change', function (e) {
                isRopeMode = e.target.checked;
                let nSlider = document.getElementById('n-slider');
                let kSlider = document.getElementById('k-slider');

                if (isRopeMode) {
                    nSlider.max = 100;
                    nSlider.value = 50;
                    N = 50;
                    document.getElementById('n-display').innerText = 50;

                    kSlider.disabled = true;
                    document.getElementById('k-display').innerText = "0 (Rope Mode)";
                    kSlider.style.opacity = '0.5';

                    initRope(50);
                } else {
                    nSlider.max = 15;
                    let safeN = Math.min(15, parseInt(nSlider.value));
                    nSlider.value = safeN;
                    N = safeN;
                    document.getElementById('n-display').innerText = safeN;

                    kSlider.disabled = false;
                    document.getElementById('k-display').innerText = parseInt(kSlider.value);
                    kSlider.style.opacity = '1.0';

                    initPendulum(safeN);
                }
            });

            document.getElementById('play-pause-btn').addEventListener('click', function (e) {
                isPaused = !isPaused;
                let btn = e.target;
                if (isPaused) {
                    btn.innerText = "PLAY";
                    btn.style.background = "#ffb86c";
                } else {
                    btn.innerText = "PAUSE";
                    btn.style.background = "#64ffda";
                }
                physicsWorker.postMessage({ type: 'pause', isPaused: isPaused });
            });

            document.getElementById('reset-btn').addEventListener('click', function () {
                if (isRopeMode) {
                    initRope(parseInt(document.getElementById('n-slider').value));
                } else {
                    initPendulum(parseInt(document.getElementById('n-slider').value));
                }
            });

            initPendulum(parseInt(document.getElementById('n-slider').value));
        }

        function initPendulum(newN) {
            traceHistory = [];
            draggedMass = -1;

            physicsWorker.postMessage({
                type: 'init_rigid',
                N: newN,
                totalLength: TOTAL_LENGTH,
                k_bend: parseInt(document.getElementById('k-slider').value),
                d_friction: parseInt(document.getElementById('d-slider').value) * 10000
            });
        }

        function initRope(newN) {
            traceHistory = [];
            draggedMass = -1;

            physicsWorker.postMessage({
                type: 'init_rope',
                N: newN,
                totalLength: TOTAL_LENGTH,
                d_friction: parseInt(document.getElementById('d-slider').value) * 10000
            });
        }

        function draw() {
            background(20);
            updateEnergyMeter();

            push();
            translate(width / 2, height / 2.2);
            let x = 0, y = 0;

            if (state.isRopeMode) {
                if (state.rope_x.length === 0) { pop(); return; }

                noFill();
                stroke(200, 200, 200, 240);
                strokeWeight(12);
                strokeJoin(ROUND);
                strokeCap(ROUND);

                beginShape();
                curveVertex(state.rope_x[0], state.rope_y[0]);
                for (let i = 0; i < state.rope_x.length; i++) {
                    curveVertex(state.rope_x[i], state.rope_y[i]);
                }
                let lastIdx = state.rope_x.length - 1;
                curveVertex(state.rope_x[lastIdx], state.rope_y[lastIdx]);
                endShape();

                if (draggedMass !== -1 && draggedMass + 1 < state.rope_x.length) {
                    fill(100, 255, 200);
                    noStroke();
                    circle(state.rope_x[draggedMass + 1], state.rope_y[draggedMass + 1], 16);
                }

                x = state.rope_x[lastIdx];
                y = state.rope_y[lastIdx];

                if (!isPaused || draggedMass !== -1) {
                    traceHistory.push({ x: x, y: y });
                    if (traceHistory.length > 500) traceHistory.shift();
                }

                noFill();
                strokeWeight(2);
                stroke(100, 200, 255, 150);
                beginShape();
                for (let p of traceHistory) vertex(p.x, p.y);
                endShape();
                pop();
                return;
            }

            // Rigid Pendulum Drawing
            if (state.angles.length === 0) { pop(); return; }

            for (let i = 0; i < state.angles.length; i++) {
                let nextX = x + state.lengths[i] * Math.sin(state.angles[i]);
                let nextY = y + state.lengths[i] * Math.cos(state.angles[i]);

                if (i === draggedMass) {
                    stroke(100, 255, 200);
                } else {
                    stroke(200, 200, 200, 240);
                }

                strokeWeight(12);
                line(x, y, nextX, nextY);

                noStroke();
                fill(80);
                circle(x, y, 16);
                if (i === state.angles.length - 1) {
                    fill(120);
                    circle(nextX, nextY, 16);
                }

                x = nextX;
                y = nextY;

                if (i === state.angles.length - 1 && (!isPaused || draggedMass !== -1)) {
                    traceHistory.push({ x: x, y: y });
                    if (traceHistory.length > 500) traceHistory.shift();
                }
            }

            noFill();
            strokeWeight(2);
            stroke(100, 200, 255, 150);
            beginShape();
            for (let p of traceHistory) vertex(p.x, p.y);
            endShape();
            pop();
        }

        function mousePressed() {
            let mx = mouseX - width / 2;
            let my = mouseY - height / 2.2;
            let minDist = 40;
            draggedMass = -1;

            if (state.isRopeMode) {
                if (state.rope_x.length === 0) return;
                for (let i = 0; i < state.rope_x.length; i++) {
                    let d = dist(mx, my, state.rope_x[i], state.rope_y[i]);
                    // i=0 is pinned
                    if (d < minDist && i !== 0) {
                        minDist = d;
                        draggedMass = i - 1; // Because rope nodes are N+1
                    }
                }
            } else {
                if (state.angles.length === 0) return;
                let x = 0, y = 0;
                for (let i = 0; i < state.angles.length; i++) {
                    x += state.lengths[i] * Math.sin(state.angles[i]);
                    y += state.lengths[i] * Math.cos(state.angles[i]);
                    let d = dist(mx, my, x, y);
                    if (d < minDist) {
                        minDist = d;
                        draggedMass = i;
                    }
                }
            }

            if (draggedMass !== -1) {
                physicsWorker.postMessage({
                    type: 'drag',
                    draggedMass: draggedMass,
                    targetX: mx,
                    targetY: my
                });
            }
        }

        function mouseDragged() {
            if (draggedMass !== -1) {
                let mx = mouseX - width / 2;
                let my = mouseY - height / 2.2;
                physicsWorker.postMessage({
                    type: 'drag',
                    draggedMass: draggedMass,
                    targetX: mx,
                    targetY: my
                });
            }
        }

        function mouseReleased() {
            if (draggedMass !== -1) {
                draggedMass = -1;
                physicsWorker.postMessage({ type: 'release' });
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
            TOTAL_LENGTH = windowHeight * 0.45;
            if (isRopeMode) {
                initRope(N);
            } else {
                initPendulum(N);
            }
        }

        function updateEnergyMeter() {
            let textEl = document.getElementById('energy-text');
            let barEl = document.getElementById('energy-bar');

            if (state.isRopeMode) {
                textEl.style.color = '#aaaaaa';
                textEl.innerText = "N/A (Rope Mode)";
                barEl.style.background = '#aaaaaa';
                barEl.style.width = '0%';
                return;
            }

            if (draggedMass !== -1) {
                textEl.style.color = '#fff';
                textEl.innerText = "(Injecting Power...)";
                barEl.style.background = '#aaaaaa';
                return;
            }

            let totalConserved = state.currentEnergy + state.accumulatedFrictionLoss;
            let drift = ((totalConserved - state.initialEnergy) / state.initialEnergy) * 100;

            if (isNaN(drift) || Math.abs(state.initialEnergy) < 1e-4) {
                textEl.style.color = '#ff6464';
                textEl.innerText = "NaN (Math Error)";
                barEl.style.width = '100%';
                barEl.style.background = '#ff6464';
            } else {
                let isStable = Math.abs(drift) < 0.2;
                textEl.style.color = isStable ? '#64ffda' : '#ff6464';
                textEl.innerText = `${drift >= 0 ? '+' : ''}${drift.toFixed(5)}%`;

                let mappedWidth = 50 + (drift / 5.0) * 50;
                mappedWidth = Math.max(0, Math.min(100, mappedWidth));
                barEl.style.width = `${mappedWidth}%`;
                barEl.style.background = isStable ? '#64ffda' : '#ff6464';
            }
        }
    </script>
</body>

</html>
