<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Soft-Body Jelly</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
        #controls {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #64ffda;
            font-family: 'JetBrains Mono', monospace;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 8px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="controls">
        Click and drag to spin the 3D camera.<br>
        Scroll to zoom in/out.<br>
        <strong>Press SPACEBAR to kick the jelly!</strong>
    </div>
    <script>
        let worker;
        let positions = new Float32Array();
        let springs = [];
        let faces = [];
        let isRunning = false;
        
        function setup() {
            // WEBGL enables 3D rendering
            createCanvas(windowWidth, windowHeight, WEBGL);
            
            worker = new Worker('worker_softbody.js');
            worker.onmessage = function(e) {
                if (e.data.type === 'render') {
                    positions = e.data.positions;
                    springs = e.data.springs;
                } else if (e.data.type === 'mesh') {
                    faces = e.data.faces;
                }
            };
            
            // Initialize a 7x7x7 jelly cube (343 nodes)
            worker.postMessage({
                type: 'init',
                size: 7,
                spacing: 30
            });

            noLoop(); // Start paused
            window.addEventListener('message', function(e) {
                if (e.data.type === 'start') {
                    isRunning = true;
                    worker.postMessage({ type: 'start' });
                    loop();
                } else if (e.data.type === 'stop') {
                    isRunning = false;
                    worker.postMessage({ type: 'stop' });
                    noLoop();
                }
            });
        }

        function draw() {
            if (!isRunning) return;
            background(10);

            // Enable 3D camera controls
            orbitControl();

            // Lighting setup for premium look
            ambientLight(50);
            directionalLight(255, 255, 255, 0.25, 0.25, -1);
            pointLight(100, 255, 218, 0, -300, 200);

            // Draw the invisible bounding room (wireframe box)
            push();
            noFill();
            stroke(50);
            strokeWeight(1);
            box(600); // from -300 to 300
            pop();

            if (positions.length === 0 || faces.length === 0) return;

            // Draw Jelly Surface Mesh
            noStroke();
            fill(100, 255, 218, 150); // Translucent jelly color
            ambientMaterial(100, 255, 218);
            specularMaterial(255);
            shininess(100);

            beginShape(TRIANGLES);
            for (let i = 0; i < faces.length; i++) {
                let idx = faces[i] * 3;
                vertex(positions[idx], positions[idx + 1], positions[idx + 2]);
            }
            endShape();
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }

        function keyPressed() {
            if (key === ' ') {
                worker.postMessage({ type: 'kick' });
            }
        }
    </script>
</body>
</html>
