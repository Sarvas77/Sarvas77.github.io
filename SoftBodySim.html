<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Soft-Body Jelly</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
        #controls {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #64ffda;
            font-family: 'JetBrains Mono', monospace;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 8px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="controls">
        Click and drag to spin the 3D camera.<br>
        Scroll to zoom in/out.<br>
        <strong>Press SPACEBAR to kick the jelly!</strong>
    </div>
    <script>
        let worker;
        let positions = new Float32Array();
        let springs = [];
        
        function setup() {
            // WEBGL enables 3D rendering
            createCanvas(windowWidth, windowHeight, WEBGL);
            
            worker = new Worker('worker_softbody.js');
            worker.onmessage = function(e) {
                if (e.data.type === 'render') {
                    positions = e.data.positions;
                    springs = e.data.springs;
                }
            };
            
            // Initialize a 7x7x7 jelly cube (343 nodes)
            worker.postMessage({
                type: 'init',
                size: 7,
                spacing: 30
            });
        }

        function draw() {
            background(10);

            // Enable 3D camera controls
            orbitControl();

            // Lighting setup for premium look
            ambientLight(50);
            directionalLight(255, 255, 255, 0.25, 0.25, -1);
            pointLight(100, 255, 218, 0, -300, 200);

            // Draw the invisible bounding room (wireframe box)
            push();
            noFill();
            stroke(50);
            strokeWeight(1);
            box(600); // from -300 to 300
            pop();

            if (positions.length === 0) return;

            // Draw Springs
            stroke(100, 255, 218, 80);
            strokeWeight(1);
            beginShape(LINES);
            for (let i = 0; i < springs.length; i++) {
                let a = springs[i][0];
                let b = springs[i][1];
                let x1 = positions[a * 3];
                let y1 = positions[a * 3 + 1];
                let z1 = positions[a * 3 + 2];
                let x2 = positions[b * 3];
                let y2 = positions[b * 3 + 1];
                let z2 = positions[b * 3 + 2];
                
                vertex(x1, y1, z1);
                vertex(x2, y2, z2);
            }
            endShape();

            // Draw Nodes
            noStroke();
            fill(100, 255, 218, 200);
            ambientMaterial(100, 255, 218);
            specularMaterial(255);
            shininess(50);

            for (let i = 0; i < positions.length / 3; i++) {
                let x = positions[i * 3];
                let y = positions[i * 3 + 1];
                let z = positions[i * 3 + 2];
                
                push();
                translate(x, y, z);
                sphere(4);
                pop();
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }

        function keyPressed() {
            if (key === ' ') {
                worker.postMessage({ type: 'kick' });
            }
        }
    </script>
</body>
</html>
